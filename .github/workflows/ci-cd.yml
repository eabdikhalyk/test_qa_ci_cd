name: CI/CD Pipeline

# Событие, которое запускает pipeline
on:
  push:
    branches: [ "main" ] # Запускается при пуше в main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачать код из репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # Шаг 2: Войти в Docker Hub, используя секреты
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Шаг 3: Собрать образ и отправить его в Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-app:latest